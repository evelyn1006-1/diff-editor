{% extends "base.html" %}

{% block title %}{{ file_path | basename }} - Diff Editor{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.css">
{% endblock %}

{% block nav %}
<span class="file-path" title="{{ file_path }}">{{ file_path }}</span>
<span id="status" class="status"></span>
<button id="btn-ai-review" title="Get AI review of changes"><span class="btn-icon">✨</span><span class="btn-text">AI Review</span></button>
<button id="btn-wrap" title="Toggle line wrapping"><span class="btn-icon">↩️</span><span class="btn-text">Wrap</span></button>
<button id="btn-textbox" title="Switch to simple textbox (mobile-friendly)"><span class="btn-icon">📝</span><span class="btn-text">Textbox</span></button>
<button id="btn-run" class="btn-primary hidden" title="Save and run this file">Run</button>
<button id="btn-save" class="btn-primary" disabled>Save</button>
{% endblock %}

{% block content %}
<div id="editor-container"></div>
<div id="run-terminal-overlay" class="run-terminal-overlay hidden">
    <div class="run-terminal-popup">
        <div id="run-terminal-resize-handle" class="run-terminal-resize-handle"></div>
        <div class="run-terminal-header">
            <span class="run-terminal-title">Run Output</span>
            <div class="run-terminal-controls">
                <button id="btn-run-terminal-popout" class="run-terminal-popout-btn" title="Open in new tab">↗</button>
                <button id="btn-run-terminal-minimize" class="run-terminal-minimize-btn" title="Minimize">─</button>
                <button id="btn-run-terminal-close" class="run-terminal-close-btn" title="Close">&times;</button>
            </div>
        </div>
        <iframe id="run-terminal-frame" class="run-terminal-frame"></iframe>
    </div>
</div>
<button id="btn-run-terminal-restore" class="run-terminal-restore hidden" title="Restore terminal">▶ Terminal</button>
<div id="ai-review-panel" class="ai-review-panel hidden">
    <div class="ai-review-header">
        <span>AI Review</span>
        <select id="reasoning-effort" title="Reasoning effort level">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
            <option value="xhigh">Max</option>
        </select>
        <button id="btn-close-review" type="button" title="Close">&times;</button>
    </div>
    <div id="ai-review-content" class="ai-review-content">
        <div class="loading">Analyzing changes...</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    window.FILE_PATH = {{ file_path | tojson }};
</script>
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script src="{{ static_url('js/diff-editor.js') }}"></script>
{% endblock %}
