{% extends "base.html" %}

{% block title %}File Browser - Diff Editor{% endblock %}

{% block nav %}
<button id="btn-terminal" class="btn-primary" title="Open terminal" onclick="location.href='/terminal'">Terminal</button>
{% endblock %}

{% block content %}
<div class="browser-container">
    <div class="browser-header">
        <button id="btn-up" title="Go up">../</button>
        <div class="dropdown-wrap">
            <button id="btn-new" title="Create new...">+ New</button>
            <div id="new-dropdown" class="dropdown-menu">
                <button class="dropdown-item" id="btn-new-file">New File</button>
                <button class="dropdown-item" id="btn-new-dir">New Directory</button>
                <label class="dropdown-item" id="btn-upload">
                    Upload File
                    <input type="file" id="upload-input" multiple hidden>
                </label>
            </div>
        </div>
        <input type="text" id="path-input" value="{{ default_root }}" placeholder="/path/to/directory">
        <label class="toggle">
            <input type="checkbox" id="show-hidden">
            <span>Show hidden</span>
        </label>
    </div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <div id="file-list" class="file-list">
        <div class="loading">Loading...</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ static_url('js/file-browser.js') }}"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        initFileBrowser({{ default_root | tojson }});
    });
</script>
{% endblock %}
