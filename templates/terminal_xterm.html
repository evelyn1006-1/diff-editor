<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xterm Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.5.0/css/xterm.min.css">
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #111318;
            color: #f2f5ff;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            overflow: hidden;
        }

        .xterm-shell {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .xterm-header {
            flex: 0 0 auto;
            display: flex;
            gap: 0.75rem;
            align-items: center;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            background: #161a22;
            font-size: 0.875rem;
        }

        #xterm-status {
            opacity: 0.9;
        }

        #xterm-status.connected {
            color: #6ad48f;
        }

        #xterm-status.error {
            color: #f28b82;
        }

        #xterm-root {
            flex: 1 1 auto;
            min-height: 0;
            padding: 0.25rem;
        }

        .xterm .xterm-viewport {
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="xterm-shell">
        <div class="xterm-header">
            <strong>Xterm</strong>
            <span>{{ ('root@' ~ cwd) if root_terminal else (cwd or '~') }}</span>
            <span id="xterm-status">Connecting...</span>
        </div>
        <div id="xterm-root"></div>
    </div>

    <script>
        window.XTERM_AUTO_CMD = {{ auto_cmd | tojson }};
        window.XTERM_CWD = {{ cwd | tojson }};
        window.XTERM_ROOT = {{ root_terminal | default(false) | tojson }};
    </script>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="{{ static_url('js/terminal-xterm.js') }}"></script>
</body>
</html>
